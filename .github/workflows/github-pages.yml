# Deploys docs/site as the public site root (/, /playground.html, …).
#
# One-time setup (cannot be automated from Git):
#   1. Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions"
#   2. After the first run, the site URL is shown in the job and under Environments → github-pages
#   (usually https://<owner>.github.io/<repo>/)
#
name: Deploy GitHub Pages

on:
  workflow_dispatch: # run manually: Actions → this workflow → Run workflow
  push:
    branches: [main]
    paths:
      - 'docs/site/**'
      - '.github/workflows/github-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
