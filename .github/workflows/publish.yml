name: Publish NuGet Packages

on:
  workflow_dispatch: # Permette l'attivazione esclusivamente manuale da interfaccia GitHub

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x
            9.0.x
            10.0.x

      - name: Restore & Build solution
        run: |
          # 1. Compila i due progetti Core principali
          dotnet build src/CSharpEssentials.HttpHelper/CSharpEssentials.HttpHelper.csproj -c Release
          dotnet build src/CSharpEssentials.LoggerHelper/CSharpEssentials.LoggerHelper.csproj -c Release
          
          # 2. Compila dinamicamente tutti i Sink senza doverli scrivere uno per uno (evita errori futuri)
          for proj in src/CSharpEssentials.LoggerHelper.Sink.*/*.csproj; do
            echo "Building $proj..."
            dotnet build "$proj" -c Release
          done

      - name: Pack all packages
        run: |
          mkdir -p nupkgs
          dotnet pack src/CSharpEssentials.LoggerHelper/CSharpEssentials.LoggerHelper.csproj -c Release --no-build -o ./nupkgs
          dotnet pack src/CSharpEssentials.HttpHelper/CSharpEssentials.HttpHelper.csproj -c Release --no-build -o ./nupkgs
          for proj in src/CSharpEssentials.LoggerHelper.Sink.*/*.csproj; do
            dotnet pack "$proj" -c Release --no-build -o ./nupkgs
          done

      - name: List generated packages
        run: ls -la nupkgs/

      - name: Publish to NuGet.org
        run: dotnet nuget push "./nupkgs/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate